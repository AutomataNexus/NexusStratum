name: E2E Site Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Site URL to test against'
        required: false
        default: 'https://stratum-ui.com'

jobs:
  e2e:
    name: E2E Site Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --save-dev @playwright/test
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/e2e/site.spec.ts --config=tests/e2e/playwright.config.ts
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url }}
